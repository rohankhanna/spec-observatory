name: Observatory Advance

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'

permissions:
  contents: write

concurrency:
  group: observatory-advance
  cancel-in-progress: false

jobs:
  advance:
    runs-on: self-hosted
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Bootstrap Codex auth
        shell: bash
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
        run: |
          export CODEX_HOME="${CODEX_HOME:-$HOME/.codex}"
          mkdir -p "$CODEX_HOME"
          chmod 700 "$CODEX_HOME"
          if [ ! -f "$CODEX_HOME/auth.json" ]; then
            if [ -z "${CODEX_AUTH_JSON:-}" ]; then
              echo "CODEX_AUTH_JSON is required to bootstrap Codex auth." >&2
              exit 1
            fi
            printf '%s' "$CODEX_AUTH_JSON" > "$CODEX_HOME/auth.json"
            chmod 600 "$CODEX_HOME/auth.json"
          fi

      - name: Install latest Codex CLI
        run: npm install -g @openai/codex@latest

      - name: Show Codex version
        run: codex --version

      - name: Run bounded advance iteration
        env:
          CODEX_MODEL: ${{ vars.CODEX_ADVANCE_MODEL }}
          CODEX_REASONING_EFFORT: xhigh
        run: ./scripts/advance_observatory.sh

      - name: Verify repo surfaces
        run: ./scripts/verify.sh

      - name: Commit advance changes
        run: |
          if git diff --quiet && [ -z "$(git ls-files --others --exclude-standard)" ]; then
            echo "No advance changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "advance: self-reimplement observatory"
          git push origin HEAD:${GITHUB_REF_NAME}
